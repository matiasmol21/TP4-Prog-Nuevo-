<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | ProgaMATE</title>
  <meta name="description" content="Tienda de periféricos gamers y más" />
  <link rel="icon" href="../src/assets/favicon.ico" />
  <link rel="stylesheet" href="../src/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
      <h1>ProgaMATE - Admin</h1>
    </div>

    <button class="logout" onclick="logout()">
      Cerrar sesión
    </button>

  </header>

  <!-- CONTENIDO -->
  <div class="admin-container">

    <h2 class="admin-title">
      Administración de Productos
    </h2>

    <!-- FORMULARIOS -->
    <section class="contenedor-formularios">

      <!-- AGREGAR -->
      <div class="form-card">

        <h2>Agregar producto</h2>

        <input type="text" id="nombre" placeholder="Nombre">

        <input type="number" id="precio" placeholder="Precio">

        <input type="number" id="stock" placeholder="Stock">

        <select id="categoria">
          <option value="1">Mouse</option>
          <option value="2">Teclado</option>
          <option value="3">Auriculares</option>
        </select>

        <input type="text" id="imagen" placeholder="URL Imagen">

        <button onclick="crearProducto()">
          Agregar Producto
        </button>

      </div>

      <!-- ACTUALIZAR -->
      <div>

      <form id="formActualizar">
      <h2>Actualizar producto</h2>

      <input id="idActualizar" type="hidden">

      <input id="nombreActualizar" placeholder="Nombre">
      <input id="precioActualizar" type="number" placeholder="Precio">
      <input id="stockActualizar" type="number" placeholder="Stock">

      <div class="form-buttons">
        <button type="submit">Guardar cambios</button>
        <button type="button" id="btnEliminar">Eliminar</button>
      </div>
      

      </form>
      </div>

    </section>

    <!-- PRODUCTOS -->
    <section>

      <h2 class="titulo-productos">
        Productos Registrados
      </h2>

      <div id="listaProductos" class="productos-container">

      </div>

    </section>

  </div>

  <script src="../src/admin.js"></script>

</body>
</html>
